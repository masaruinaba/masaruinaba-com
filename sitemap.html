<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Experiments - Sitemap</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #F7F7F7;
        font-family: "Inter", sans-serif;
        padding: 40px 20px;
        color: #222222;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        margin-bottom: 48px;
      }

      .header h1 {
        font-size: 48px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }

      .header p {
        font-size: 16px;
        color: #666666;
      }

      .experiments-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 24px;
        margin-bottom: 48px;
      }

      .experiment-card {
        background: #ffffff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        transition: all 0.2s ease;
        text-decoration: none;
        color: inherit;
        display: block;
      }

      .experiment-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }

      .experiment-card:active {
        transform: translateY(0);
      }

      .experiment-number {
        font-size: 14px;
        font-weight: 600;
        color: #888888;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .experiment-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #222222;
      }

      .experiment-description {
        font-size: 14px;
        color: #666666;
        line-height: 1.5;
      }

      .experiment-status {
        display: inline-block;
        margin-top: 12px;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        background: #f0f0f0;
        color: #666666;
      }

      .experiment-status.active {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .footer {
        margin-top: 64px;
        padding-top: 32px;
        border-top: 1px solid #e0e0e0;
        text-align: center;
        color: #888888;
        font-size: 14px;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 36px;
        }

        .experiments-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Animation Experiments</h1>
        <p>Collection of animation experiments</p>
      </div>

      <div class="experiments-grid" id="experimentsGrid">
        <!-- 実験ファイルはJavaScriptで動的に追加されます -->
      </div>

      <div class="footer">
        <p>Studio Play v1 - Animation Experiments</p>
      </div>
    </div>

    <script>
      /**
       * 実験ファイルのリスト
       * 新しいファイルを追加する際は、この配列に追加してください
       */
      const experiments = [
        {
          id: 'v0001',
          title: 'Mosaic Reveal Animation',
          description: 'Mouse-following mosaic reveal animation with image strips',
          status: 'active',
          file: 'v0001.html'
        },
        {
          id: 'v0002',
          title: 'Interactive Eye-Following Card',
          description: 'Interactive eye-following card animation that tracks mouse movement',
          status: 'active',
          file: 'v0002.html'
        }
      ];

      /**
       * 実験カードを生成
       */
      function createExperimentCard(experiment) {
        const card = document.createElement('a');
        card.className = 'experiment-card';
        card.href = experiment.file || `${experiment.id}.html`;
        
        const number = document.createElement('div');
        number.className = 'experiment-number';
        number.textContent = experiment.id;
        
        const title = document.createElement('div');
        title.className = 'experiment-title';
        title.textContent = experiment.title;
        
        const description = document.createElement('div');
        description.className = 'experiment-description';
        description.textContent = experiment.description;
        
        const status = document.createElement('span');
        status.className = `experiment-status ${experiment.status || ''}`;
        status.textContent = experiment.status === 'active' ? 'Active' : 'Draft';
        
        card.appendChild(number);
        card.appendChild(title);
        card.appendChild(description);
        card.appendChild(status);
        
        return card;
      }

      /**
       * 実験リストを表示
       */
      function renderExperiments() {
        const grid = document.getElementById('experimentsGrid');
        
        experiments.forEach(experiment => {
          const card = createExperimentCard(experiment);
          grid.appendChild(card);
        });
      }

      // DOM Ready
      document.addEventListener('DOMContentLoaded', () => {
        renderExperiments();
      });
    </script>
  </body>
</html>
