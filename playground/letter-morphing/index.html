<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Letter of Letters — Masaru Inaba</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="A Letter of Letters — Masaru Inaba" />
    <meta property="og:description" content="Letter morphing animation — typographic experiment by Masaru Inaba." />
    <meta property="og:image" content="/ogp.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A Letter of Letters — Masaru Inaba" />
    <meta name="twitter:description" content="Letter morphing animation — typographic experiment by Masaru Inaba." />
    <meta name="twitter:image" content="/ogp.png" />
  <meta name="description" content="Letter morphing animation — typographic experiment by Masaru Inaba." />
  
  <!-- Three.js (v145 is stable for global scripts) & GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0b0b0c;
      margin: 0;
      overflow: hidden;
    }

    /* Control UI Container */
    .controls-ui {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .reset-button {
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      font-family: "Inter", sans-serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 100px;
    }

    .reset-button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }

    /* Scale UI */
    .scale-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scale-control label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .scale-control input[type="range"] {
      width: 80px;
      height: 2px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      border-radius: 2px;
    }

    .scale-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      background: #ffffff;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="webgl-container"></div>
  <div class="controls-ui">
    <div class="scale-control">
      <label>Scale</label>
      <input type="range" id="scale-slider" min="0.5" max="3" step="0.1" value="1">
    </div>
    <button class="reset-button" id="reset-btn">Reset</button>
  </div>

  <script>
    // プレビューモードの検出
    const urlParams = new URLSearchParams(window.location.search);
    const isPreview = urlParams.get('preview') === 'true';
    
    // 全切除：タイトル文字などは一切なし
    
    const TOTAL_NODES = 2500;
    const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    
    let scene, camera, renderer, controls, raycaster, mouse;
    let nodes = [];
    let letterTextures = {};
    let lines;
    let isMorphing = false;

    // --- Letter Sampling ---
    const sCanvas = document.createElement('canvas');
    const sCtx = sCanvas.getContext('2d');

    function getLetterPoints(letter) {
      const size = 256;
      sCanvas.width = size;
      sCanvas.height = size;
      
      sCtx.fillStyle = 'black';
      sCtx.fillRect(0, 0, size, size);
      sCtx.fillStyle = 'white';
      // フォントを太く、確実に読み込まれるように指定
      sCtx.font = `900 ${size * 0.8}px sans-serif`;
      sCtx.textAlign = 'center';
      sCtx.textBaseline = 'middle';
      sCtx.fillText(letter, size / 2, size / 2);

      const data = sCtx.getImageData(0, 0, size, size).data;
      const points = [];
      
      for (let y = 0; y < size; y += 2) {
        for (let x = 0; x < size; x += 2) {
          const i = (y * size + x) * 4;
          if (data[i] > 128) {
            points.push({
              x: (x / size - 0.5) * 800,
              y: (0.5 - y / size) * 800,
              z: (Math.random() - 0.5) * 60
            });
          }
        }
      }

      const result = [];
      for (let i = 0; i < TOTAL_NODES; i++) {
        result.push(points[i % points.length]);
      }
      return result;
    }

    // --- Character Textures ---
    function initTextures() {
      LETTERS.split('').forEach(char => {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.font = '900 50px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(char, 32, 32);
        const tex = new THREE.CanvasTexture(canvas);
        letterTextures[char] = tex;
      });
    }

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 10000);
      camera.position.z = 1200;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x0b0b0c, 1);
      document.getElementById('webgl-container').appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      initTextures();

      // Node Creation
      for (let i = 0; i < TOTAL_NODES; i++) {
        const char = LETTERS[Math.floor(Math.random() * LETTERS.length)];
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = (Math.random() - 0.5) * 2000;

        const mat = new THREE.SpriteMaterial({ map: letterTextures[char], transparent: true, opacity: 0.8 });
        const sprite = new THREE.Sprite(mat);
        sprite.position.set(x, y, z);
        sprite.scale.set(30, 30, 1);
        
        scene.add(sprite);
        nodes.push({
          sprite: sprite,
          char: char,
          pos: sprite.position,
          base: new THREE.Vector3(x, y, z),
          offset: new THREE.Vector3(0, 0, 0)
        });
      }

      // Line Connections
      const lineGeom = new THREE.BufferGeometry();
      const linePos = new Float32Array(TOTAL_NODES * 6);
      lineGeom.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
      const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
      lines = new THREE.LineSegments(lineGeom, lineMat);
      scene.add(lines);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      if (!isPreview) {
        window.addEventListener('click', onDocClick);
      }
      document.getElementById('reset-btn').addEventListener('click', resetNetwork);
      document.getElementById('scale-slider').addEventListener('input', (e) => {
        const scale = parseFloat(e.target.value);
        scene.scale.set(scale, scale, scale);
      });
      
      // プレビューモード: 自動でモーフィングを開始
      if (isPreview) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            // ランダムな文字を選択してモーフィング
            const randomLetter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
            morph(randomLetter);
            
            // 定期的に別の文字にモーフィング
            setInterval(() => {
              if (!isMorphing) {
                const nextLetter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
                morph(nextLetter);
              }
            }, 3000);
          }, 1000);
        });
      }
      
      animate();
    }

    function onDocClick(e) {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return; // UI干渉防止
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      
      const hits = raycaster.intersectObjects(nodes.map(n => n.sprite));
      if (hits.length > 0) {
        const hitNode = nodes.find(n => n.sprite === hits[0].object);
        morph(hitNode.char);
      }
    }

    function resetNetwork() {
      if (isMorphing) return;
      isMorphing = true;
      
      nodes.forEach((node, i) => {
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = (Math.random() - 0.5) * 2000;

        gsap.to(node.base, {
          x: x,
          y: y,
          z: z,
          duration: 2,
          ease: "power2.inOut",
          delay: Math.random() * 0.5,
          onComplete: () => { if(i === TOTAL_NODES - 1) isMorphing = false; }
        });
      });
    }

    function morph(letter) {
      if (isMorphing) return;
      isMorphing = true;
      const targets = getLetterPoints(letter);
      
      nodes.forEach((node, i) => {
        const t = targets[i];
        gsap.to(node.base, {
          x: t.x + (Math.random() - 0.5) * 20,
          y: t.y + (Math.random() - 0.5) * 20,
          z: t.z,
          duration: 1.5,
          ease: "expo.inOut",
          delay: Math.random() * 0.4,
          onComplete: () => { if(i === TOTAL_NODES - 1) isMorphing = false; }
        });
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      const lPos = lines.geometry.attributes.position.array;
      const t = Date.now() * 0.001;

      nodes.forEach((n, i) => {
        // 微細な浮遊
        n.offset.x = Math.sin(t + i * 0.1) * 3;
        n.offset.y = Math.cos(t * 0.9 + i * 0.1) * 3;
        
        n.sprite.position.copy(n.base).add(n.offset);

        // 線を更新
        const next = nodes[(i + 1) % TOTAL_NODES];
        lPos[i * 6] = n.sprite.position.x;
        lPos[i * 6 + 1] = n.sprite.position.y;
        lPos[i * 6 + 2] = n.sprite.position.z;
        lPos[i * 6 + 3] = next.sprite.position.x;
        lPos[i * 6 + 4] = next.sprite.position.y;
        lPos[i * 6 + 5] = next.sprite.position.z;
      });

      lines.geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
