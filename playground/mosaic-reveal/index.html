<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosaic Reveal — Masaru Inaba</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mosaic Reveal — Masaru Inaba" />
    <meta property="og:description" content="Mosaic-style image reveal animation experiment by Masaru Inaba." />
    <meta property="og:image" content="/ogp.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mosaic Reveal — Masaru Inaba" />
    <meta name="twitter:description" content="Mosaic-style image reveal animation experiment by Masaru Inaba." />
    <meta name="twitter:image" content="/ogp.png" />
    <meta name="description" content="Mosaic-style image reveal animation experiment by Masaru Inaba." />

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        background: #F7F7F7;
        cursor: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cursor {
        position: fixed;
        width: 8px;
        height: 8px;
        background: #000000;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
      }

      .title {
        font-family: "Inter", sans-serif;
        font-size: 100px;
        font-weight: 500;
        color: #222222;
        letter-spacing: -0.02em;
        user-select: none;
        position: relative;
        z-index: 1;
      }

      .mosaic-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        mix-blend-mode: multiply;
      }

      .mosaic-card {
        position: absolute;
        overflow: hidden;
        background: transparent;
        transform: translate(-50%, -50%);
        opacity: 0;
      }

      .mosaic-strip {
        position: absolute;
        left: 0;
        width: 100%;
        will-change: clip-path;
      }
    </style>
  </head>
  <body>
    <div class="cursor" id="cursor"></div>
    <h1 class="title" id="title">Image Field</h1>
    <div class="mosaic-container" id="mosaicContainer"></div>

    <script>
      // プレビューモードの検出
      const urlParams = new URLSearchParams(window.location.search);
      const isPreview = urlParams.get('preview') === 'true';
      
      // マウス位置
      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let lastMouseX = mouseX;
      let lastMouseY = mouseY;
      let isMoving = false;
      let moveTimeout = null;

      // カーソル要素
      const cursorElement = document.getElementById("cursor");

      // 複数の画像URL
      const imageUrls = [
        "https://picsum.photos/800/800?random=1",
        "https://picsum.photos/800/800?random=2",
        "https://picsum.photos/800/800?random=3",
        "https://picsum.photos/800/800?random=4",
        "https://picsum.photos/800/800?random=5",
        "https://picsum.photos/800/800?random=6",
      ];

      // アクティブなカードの管理
      const container = document.getElementById("mosaicContainer");
      const activeCards = [];
      const gridSize = 12;

      /**
       * モザイクカードを作成
       */
      function createMosaicCard(x, y, size) {
        const card = document.createElement("div");
        card.className = "mosaic-card";
        card.style.width = size + "px";
        card.style.height = size + "px";

        const imageSrc = imageUrls[Math.floor(Math.random() * imageUrls.length)];
        const strips = [];
        const stripHeight = 100 / gridSize;

        // ストリップ（行）を生成
        for (let i = 0; i < gridSize; i++) {
          const strip = document.createElement("div");
          strip.className = "mosaic-strip";
          strip.style.top = `${i * stripHeight}%`;
          strip.style.height = `${stripHeight + 0.5}%`;
          strip.style.backgroundImage = `url("${imageSrc}")`;
          strip.style.backgroundSize = `${size}px ${size}px`;
          strip.style.backgroundPosition = `0 -${(i * stripHeight / 100) * size}px`;
          strip.dataset.index = i;

          card.appendChild(strip);
          strips.push(strip);
        }

        container.appendChild(card);

        // 初期状態
        gsap.set(card, {
          x: x,
          y: y,
          opacity: 1,
          scale: 0.8,
        });

        gsap.set(strips, {
          clipPath: "inset(0 50% 0 50%)",
        });

        // アニメーション
        const center = gridSize / 2;
        const maxDist = center;
        const staggerTime = 0.025;

        const tl = gsap.timeline({
          onComplete: () => {
            // 完了後にカードを削除
            const index = activeCards.findIndex((item) => item.card === card);
            if (index !== -1) {
              activeCards.splice(index, 1);
            }
            if (card.parentNode) {
              card.parentNode.removeChild(card);
            }
          },
        });

        // スケールアップ
        tl.to(card, {
          scale: 1,
          duration: 0.4,
          ease: "power2.out",
        }, 0);

        // 開く: 中央から両端へ
        strips.forEach((strip) => {
          const index = parseInt(strip.dataset.index);
          const dist = Math.abs(index - center + 0.5);
          const normalizedDist = dist / maxDist;
          const delay = normalizedDist * staggerTime * (gridSize / 2);

          tl.to(
            strip,
            {
              clipPath: "inset(0 0% 0 0%)",
              duration: 0.3,
              ease: "power2.out",
            },
            delay
          );
        });

        // 待機
        const openDuration = staggerTime * (gridSize / 2) + 0.3;
        tl.to({}, { duration: 0.15 }, openDuration);

        // 閉じる: 両端から中央へ
        strips.forEach((strip) => {
          const index = parseInt(strip.dataset.index);
          const dist = Math.abs(index - center + 0.5);
          const normalizedDist = dist / maxDist;
          const delay = (1 - normalizedDist) * staggerTime * (gridSize / 2);

          tl.to(
            strip,
            {
              clipPath: "inset(0 50% 0 50%)",
              duration: 0.25,
              ease: "power2.in",
            },
            openDuration + 0.15 + delay
          );
        });

        // スケールダウン＆フェードアウト
        const closeDuration = staggerTime * (gridSize / 2) + 0.25;
        tl.to(card, {
          scale: 0.9,
          opacity: 0,
          duration: 0.3,
          ease: "power2.in",
        }, openDuration + 0.15 + closeDuration - 0.1);

        // 不規則な追従パラメータ
        const followSpeed = 1.2 + Math.random() * 1.0;
        const offsetX = (Math.random() - 0.5) * 180;
        const offsetY = (Math.random() - 0.5) * 180;
        const parallaxFactor = 0.15 + Math.random() * 0.35;

        // カード情報を保存
        const cardData = {
          card,
          timeline: tl,
          offsetX,
          offsetY,
          followSpeed,
          parallaxFactor,
          targetX: x + offsetX,
          targetY: y + offsetY,
        };

        activeCards.push(cardData);

        // 初期位置へ移動
        gsap.to(card, {
          x: cardData.targetX,
          y: cardData.targetY,
          duration: followSpeed,
          ease: "power1.out",
        });

        return cardData;
      }

      // カード位置を更新（不規則な追従）
      function updateCardPosition(cardData) {
        const { card, offsetX, offsetY, followSpeed, parallaxFactor } = cardData;

        // パララックス効果を加えた目標位置
        const dx = mouseX - cardData.targetX;
        const dy = mouseY - cardData.targetY;
        const newTargetX = mouseX + offsetX + dx * parallaxFactor;
        const newTargetY = mouseY + offsetY + dy * parallaxFactor;

        cardData.targetX = newTargetX;
        cardData.targetY = newTargetY;

        gsap.to(card, {
          x: newTargetX,
          y: newTargetY,
          duration: followSpeed,
          ease: "power1.out",
        });
      }

      // すべてのカードをフェードアウト
      function fadeOutAllCards() {
        activeCards.forEach(({ card, timeline }) => {
          if (timeline) timeline.kill();
          gsap.to(card, {
            opacity: 0,
            scale: 0.8,
            duration: 0.3,
            ease: "power2.out",
            onComplete: () => {
              if (card.parentNode) {
                card.parentNode.removeChild(card);
              }
            },
          });
        });
        activeCards.length = 0;
      }

      // マウス移動検知
      let lastMoveTime = Date.now();
      let cardCreateCooldown = 0;

      const handleMouseMoveEvent = (e) => {
        const now = Date.now();
        const timeSinceLastMove = now - lastMoveTime;

        mouseX = e.clientX;
        mouseY = e.clientY;

        // カーソル位置を更新
        cursorElement.style.left = mouseX + "px";
        cursorElement.style.top = mouseY + "px";

        // マウスが動いているか判定
        const dx = mouseX - lastMouseX;
        const dy = mouseY - lastMouseY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 3) {
          isMoving = true;
          lastMoveTime = now;
          lastMouseX = mouseX;
          lastMouseY = mouseY;

          // 停止タイマーをクリア
          if (moveTimeout) {
            clearTimeout(moveTimeout);
            moveTimeout = null;
          }

          // クールダウンを減らす
          cardCreateCooldown = Math.max(0, cardCreateCooldown - timeSinceLastMove);

          // 一定間隔で新しいカードを生成
          const speed = timeSinceLastMove > 0 ? distance / timeSinceLastMove : 0;
          if (cardCreateCooldown <= 0 && speed > 0.02) {
            // スケールアップ用のサイズ（100〜200px）
            const baseSize = 150;
            const sizeVariation = 50;
            const cardSize = baseSize - sizeVariation + Math.random() * sizeVariation * 2;

            createMosaicCard(mouseX, mouseY, cardSize);
            cardCreateCooldown = 150 + Math.random() * 100; // 150〜250msのクールダウン
          }
        } else {
          // マウスが停止している
          if (isMoving && timeSinceLastMove > 100) {
            isMoving = false;
            moveTimeout = setTimeout(() => {
              fadeOutAllCards();
            }, 500);
          }
        }
      };
      
      // マウス移動イベントリスナー
      if (!isPreview) {
        document.addEventListener("mousemove", handleMouseMoveEvent);
      } else {
        // プレビューモード: 自動アニメーション
        let previewInterval = null;
        let previewAngle = 0;
        let previewCardInterval = null;
        
        const startPreviewAnimation = () => {
          const centerX = window.innerWidth / 2;
          const centerY = window.innerHeight / 2;
          const radius = Math.min(window.innerWidth, window.innerHeight) * 0.3;
          
          // マウス位置を自動で動かす
          previewInterval = setInterval(() => {
            previewAngle += 0.02;
            mouseX = centerX + Math.cos(previewAngle) * radius;
            mouseY = centerY + Math.sin(previewAngle) * radius;
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            isMoving = true;
            
            // カーソル位置を更新
            cursorElement.style.left = mouseX + "px";
            cursorElement.style.top = mouseY + "px";
          }, 50);
          
          // カード生成を強制的に実行（プレビューモード用）
          previewCardInterval = setInterval(() => {
            if (isMoving) {
              const baseSize = 150;
              const sizeVariation = 50;
              const cardSize = baseSize - sizeVariation + Math.random() * sizeVariation * 2;
              createMosaicCard(mouseX, mouseY, cardSize);
            }
          }, 200); // 200msごとにカードを生成
        };
        
        window.addEventListener('load', () => {
          setTimeout(() => {
            startPreviewAnimation();
          }, 500);
        });
      }

      // アニメーションループ（カード位置を更新）
      function animate() {
        if (isMoving) {
          activeCards.forEach((cardData) => {
            updateCardPosition(cardData);
          });
        }
        requestAnimationFrame(animate);
      }
      animate();

      // ウィンドウリサイズ時の処理
      window.addEventListener("resize", () => {
        mouseX = window.innerWidth / 2;
        mouseY = window.innerHeight / 2;
        lastMouseX = mouseX;
        lastMouseY = mouseY;
      });
    </script>
  </body>
</html>
