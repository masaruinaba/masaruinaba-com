    <script>
      /**
       * Check if color is light (for text color adjustment)
       */
      function isLightColor(color) {
        // Handle rgb() format
        if (color.startsWith('rgb')) {
          const matches = color.match(/\d+/g);
          if (matches && matches.length >= 3) {
            const r = parseInt(matches[0]);
            const g = parseInt(matches[1]);
            const b = parseInt(matches[2]);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 180;
          }
        }
        
        // Handle hex format
        const hex = color.replace('#', '');
        if (hex.length === 3) {
          // Expand shorthand hex
          const r = parseInt(hex[0] + hex[0], 16);
          const g = parseInt(hex[1] + hex[1], 16);
          const b = parseInt(hex[2] + hex[2], 16);
          const brightness = (r * 299 + g * 587 + b * 114) / 1000;
          return brightness > 180;
        }
        
        const r = parseInt(hex.substr(0, 2), 16);
        const g = parseInt(hex.substr(2, 2), 16);
        const b = parseInt(hex.substr(4, 2), 16);
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        return brightness > 180;
      }

      /**
       * Adjust color if it's too light
       */
      function adjustColorForHover(color) {
        if (isLightColor(color)) {
          // If color is light, use a darker version or complementary color
          const hex = color.replace('#', '');
          const r = parseInt(hex.substr(0, 2), 16);
          const g = parseInt(hex.substr(2, 2), 16);
          const b = parseInt(hex.substr(4, 2), 16);
          
          // Darken by 40%
          const newR = Math.max(0, Math.floor(r * 0.6));
          const newG = Math.max(0, Math.floor(g * 0.6));
          const newB = Math.max(0, Math.floor(b * 0.6));
          
          return `rgb(${newR}, ${newG}, ${newB})`;
        }
        return color;
      }

      /**
       * Capture thumbnail from HTML file using iframe
       */
      async function captureThumbnail(file) {
        return new Promise((resolve) => {
          const iframe = document.createElement('iframe');
          iframe.style.width = '800px';
          iframe.style.height = '600px';
          iframe.style.position = 'absolute';
          iframe.style.left = '-9999px';
          iframe.style.top = '0';
          iframe.style.border = 'none';
          
          iframe.onload = () => {
            setTimeout(() => {
              try {
                const canvas = document.createElement('canvas');
                canvas.width = 50;
                canvas.height = 38;
                const ctx = canvas.getContext('2d');
                
                // Try to capture from iframe (may fail due to CORS)
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const body = iframeDoc.body;
                
                // Use html2canvas if available, otherwise fallback to color
                // For now, use a placeholder approach
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(0, 0, 50, 38);
                
                document.body.removeChild(iframe);
                resolve(canvas.toDataURL());
              } catch (e) {
                document.body.removeChild(iframe);
                // Fallback to color-based thumbnail
                resolve(null);
              }
            }, 1000);
          };
          
          iframe.src = file;
          document.body.appendChild(iframe);
        });
      }

      function showCursorPreview(src, type = 'image') {
        if (type === 'iframe') {
          cursorPreviewImg.style.display = 'none';
          cursorPreviewFrame.style.display = 'block';
          if (cursorPreviewFrame.src !== src) {

          color: '#F7F7F7'
        },
        {

          color: '#0b0b0c'
        },
        {

          type: 'Animation',
          title: 'Hover Text Path',
          file: 'playground/hover-text-path/',
          color: '#20453B'
        },
        {
          year: '2025',

          file: 'playground/eye-following/',

        {

      /**
       * Studio works list (試作品)

      const studioWorks = [
        {
          year: '2025',

          file: 'apps/typography/',
          color: '#ffffff',

      /**
       * Create accordion detail row (mobile only)
       */
      function createDetailRow(work) {
        const detailRow = document.createElement('tr');
        detailRow.className = 'work-detail-row';

        const cell = document.createElement('td');
        cell.colSpan = 6;
        cell.className = 'work-detail-cell';

        const inner = document.createElement('div');
        inner.className = 'work-detail-inner';

        const content = document.createElement('div');
        content.className = 'work-detail-content';

        // Preview: client works のみ表示
        if (work.image) {
          const preview = document.createElement('div');
          preview.className = 'work-detail-preview';
          const img = document.createElement('img');
          img.src = work.image;
          img.alt = work.title;
          preview.appendChild(img);
          content.appendChild(preview);
        }

        // Meta list: Year / Type / URL or File
        const metaList = document.createElement('div');
        metaList.className = 'work-detail-meta-list';

        const urlLabel = work.image ? 'URL' : 'File';
        const urlValue = work.displayFile || work.file.replace(/\/$/, '');

        [
          { label: 'Year', value: work.year },
          { label: 'Type', value: work.type },
          { label: urlLabel, value: urlValue, href: work.file },
        ].forEach(({ label, value, href }) => {
          const item = document.createElement('div');
          item.className = 'work-detail-meta-item';

          const labelEl = document.createElement('span');
          labelEl.className = 'work-detail-meta-label';
          labelEl.textContent = label;

          const valueEl = href ? document.createElement('a') : document.createElement('span');
          valueEl.className = 'work-detail-meta-value';
          valueEl.textContent = value;
          if (href) {
            valueEl.href = href;
            valueEl.target = '_blank';
            valueEl.rel = 'noopener';
          }

          item.appendChild(labelEl);
          item.appendChild(valueEl);
          metaList.appendChild(item);
        });

        content.appendChild(metaList);
        inner.appendChild(content);
        cell.appendChild(inner);
        detailRow.appendChild(cell);

        return detailRow;
      }

      /**
       * Create work row
       */
      function createWorkRow(work) {
        const row = document.createElement('tr');
        row.className = 'work-row';
        
        const adjustedColor = adjustColorForHover(work.color);
        row.style.setProperty('--hover-color', adjustedColor);
        
        // Determine text color based on background
        const textColor = isLightColor(adjustedColor) ? '#222222' : '#ffffff';
        const secondaryTextColor = isLightColor(adjustedColor) ? '#666666' : 'rgba(255, 255, 255, 0.8)';
        
        // Create row background element
        const rowBg = document.createElement('div');
        rowBg.className = 'row-bg';
        rowBg.style.backgroundColor = adjustedColor;
        
        // Thumbnail
        const thumbnailCell = document.createElement('td');
        thumbnailCell.style.position = 'relative';
        
        const thumbnail = document.createElement('img');
        thumbnail.src = work.thumbnail || `thumbnails/${work.file.replace('.html', '.png')}`;
        thumbnail.alt = work.title;
        thumbnail.className = 'thumbnail';
        
        thumbnail.onerror = () => {
          // Fallback to color-based thumbnail using adjusted hover color
          const canvas = document.createElement('canvas');
          canvas.width = 8;
          canvas.height = 8;
          const ctx = canvas.getContext('2d');
          
          // Use adjusted hover color (same as hover background)
          ctx.fillStyle = adjustedColor;
          ctx.fillRect(0, 0, 8, 8);
          
          thumbnail.src = canvas.toDataURL();
        };
        
        // Set thumbnail color immediately if no image
        if (!work.thumbnail) {
          const canvas = document.createElement('canvas');
          canvas.width = 8;
          canvas.height = 8;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = adjustedColor;
          ctx.fillRect(0, 0, 8, 8);
          thumbnail.src = canvas.toDataURL();
        }
        
        // Place rowBg in first cell and make it cover entire row
        thumbnailCell.appendChild(rowBg);
        thumbnailCell.appendChild(thumbnail);
        
        // Year
        const yearCell = document.createElement('td');
        yearCell.className = 'year';
        yearCell.style.fontSize = '10px';
        yearCell.style.fontWeight = '400';
        yearCell.style.color = '#999999';
        yearCell.style.fontFamily = '"IBM Plex Mono", monospace';
        yearCell.textContent = work.year;
        yearCell.setAttribute('data-text-color', secondaryTextColor);
        
        // Type
        const typeCell = document.createElement('td');
        typeCell.className = 'type';
        typeCell.style.fontSize = '10px';
        typeCell.style.fontWeight = '400';
        typeCell.style.color = '#999999';
        typeCell.style.textTransform = 'capitalize';
        typeCell.style.fontFamily = '"IBM Plex Mono", monospace';
        typeCell.textContent = work.type;
        typeCell.setAttribute('data-text-color', secondaryTextColor);
        
        // Title
        const titleCell = document.createElement('td');
        titleCell.className = 'title';
        titleCell.style.fontSize = '13px';
        titleCell.style.fontWeight = '400';
        titleCell.style.fontFamily = '"Bricolage Grotesque", sans-serif';
        titleCell.textContent = work.title;
        titleCell.setAttribute('data-text-color', textColor);
        
        // Filename
        const filenameCell = document.createElement('td');
        filenameCell.className = 'filename';
        filenameCell.style.fontSize = '10px';
        filenameCell.style.fontWeight = '400';
        filenameCell.style.color = '#999999';
        filenameCell.style.fontFamily = '"IBM Plex Mono", monospace';
        filenameCell.textContent = work.displayFile || work.file.replace(/\/index\.html$/, '').replace(/\/$/, '');
        filenameCell.setAttribute('data-text-color', secondaryTextColor);
        
        // Arrow (desktop) + Expand icon (mobile)
        const arrowCell = document.createElement('td');
        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'arrow-icon';
        arrowSpan.textContent = '→';
        arrowSpan.setAttribute('data-text-color', textColor);
        arrowCell.appendChild(arrowSpan);

        const expandIcon = document.createElement('span');
        expandIcon.className = 'expand-icon';
        expandIcon.textContent = '−';
        arrowCell.appendChild(expandIcon);
        
        row.appendChild(thumbnailCell);
        row.appendChild(yearCell);
        row.appendChild(typeCell);
        row.appendChild(titleCell);
        row.appendChild(filenameCell);
        row.appendChild(arrowCell);
        
        // Position rowBg to cover entire row
        // Calculate offset to cover entire row from first cell
        const updateRowBgPosition = () => {
          const tableRect = row.closest('table').getBoundingClientRect();
          const cellRect = thumbnailCell.getBoundingClientRect();
          const offsetLeft = cellRect.left - tableRect.left;
          rowBg.style.left = `${-offsetLeft}px`;
          rowBg.style.width = `${tableRect.width}px`;
        };
        
        // Initial position update
        setTimeout(updateRowBgPosition, 0);
        
        // GSAP hover animation（ホバー対応デバイスのみ）
        const canHover = window.matchMedia('(hover: hover)').matches;
        const cells = [yearCell, typeCell, titleCell, filenameCell, arrowSpan];
        let hoverTimeline = null;

        // Store original colors
        const originalColors = {
          year: yearCell.style.color || '#999999',
          type: typeCell.style.color || '#999999',
          title: titleCell.style.color || '#222222',
          filename: filenameCell.style.color || '#999999',
          arrow: arrowSpan.style.color || '#222222'
        };

        if (canHover) row.addEventListener('mouseenter', () => {
          // Kill any existing animations
          if (hoverTimeline) {
            hoverTimeline.kill();
          }
          
          updateRowBgPosition();
          
          hoverTimeline = gsap.timeline();
          
          // Background animation with scaleX - smoother easing
          hoverTimeline.to(rowBg, {
            scaleX: 1,
            transformOrigin: 'left center',
            duration: 0.7,
            ease: 'power3.out'
          }, 0);
          
          // Text color animations with stagger
          cells.forEach((cell, index) => {
            const color = cell.getAttribute('data-text-color');
            hoverTimeline.to(cell, {
              color: color,
              duration: 0.35,
              ease: 'power2.out'
            }, 0.05 + index * 0.02);
          });
          
          // Arrow animation with bounce
          hoverTimeline.to(arrowSpan, {
            opacity: 1,
            x: 0,
            duration: 0.5,
            ease: 'back.out(1.2)'
          }, 0.15);
        });

        if (canHover) row.addEventListener('mouseleave', () => {
          
          // Kill any existing animations
          if (hoverTimeline) {
            hoverTimeline.kill();
            hoverTimeline = null;
          }
          
          hoverTimeline = gsap.timeline({
            onComplete: () => {
              // Ensure everything is reset
              gsap.set(rowBg, { scaleX: 0 });
              yearCell.style.color = originalColors.year;
              typeCell.style.color = originalColors.type;
              titleCell.style.color = originalColors.title;
              filenameCell.style.color = originalColors.filename;
              arrowSpan.style.opacity = '0';
              arrowSpan.style.transform = 'translateX(-4px)';
              arrowSpan.style.color = originalColors.arrow;
              hoverTimeline = null;
            }
          });
          
          // Background animation - reset to 0 - smoother easing
          hoverTimeline.to(rowBg, {
            scaleX: 0,
            transformOrigin: 'left center',
            duration: 0.5,
            ease: 'power3.in'
          }, 0);
          
          // Text color animations - reset to original colors
          hoverTimeline.to(yearCell, {
            color: originalColors.year,
            duration: 0.25,
            ease: 'power2.in'
          }, 0);
          
          hoverTimeline.to(typeCell, {
            color: originalColors.type,
            duration: 0.25,
            ease: 'power2.in'
          }, 0);
          
          hoverTimeline.to(titleCell, {
            color: originalColors.title,
            duration: 0.25,
            ease: 'power2.in'
          }, 0);
          
          hoverTimeline.to(filenameCell, {
            color: originalColors.filename,
            duration: 0.25,
            ease: 'power2.in'
          }, 0);
          
          // Arrow animation - reset
          hoverTimeline.to(arrowSpan, {
            opacity: 0,
            x: -4,
            color: originalColors.arrow,
            duration: 0.3,
            ease: 'power2.in'
          }, 0);
        });
        
        // Click: mobile → accordion toggle / desktop → open link
        row.addEventListener('click', (e) => {
          if (window.innerWidth <= 768) {
            // アコーディオン内のリンクはそのまま通す
            if (e.target.tagName === 'A') return;
            const isExpanded = row.classList.toggle('is-expanded');
            if (row._detailRow) {
              row._detailRow.classList.toggle('is-open', isExpanded);
            }
          } else {
            window.open(work.file, '_blank');
          }
        });
        
        return row;
      }

      /**
       * Render works list
       */
      function renderWorks() {
        const tbody = document.getElementById('worksTableBody');

        works.forEach(work => {
          const row = createWorkRow(work);
          const detailRow = createDetailRow(work);
          row._detailRow = detailRow;

          if (window.matchMedia('(hover: hover)').matches) {
            row.addEventListener('mouseenter', () => showCursorPreview(work.file, 'iframe'));
            row.addEventListener('mouseleave', hideCursorPreview);
          }

          tbody.appendChild(row);
          tbody.appendChild(detailRow);
        });
      }

      /**
       * Render Studio works list
       */
      function renderStudioWorks() {
        const tbody = document.getElementById('studioTableBody');

        studioWorks.forEach(work => {
          const row = createWorkRow(work);
          const detailRow = createDetailRow(work);
          row._detailRow = detailRow;

          if (window.matchMedia('(hover: hover)').matches) {
            row.addEventListener('mouseenter', () => showCursorPreview(work.file, 'iframe'));
            row.addEventListener('mouseleave', hideCursorPreview);
          }

          tbody.appendChild(row);
          tbody.appendChild(detailRow);
        });
      }

      // DOM Ready
      document.addEventListener('DOMContentLoaded', () => {
        renderClientWorks();
        renderWorks();
        renderStudioWorks();

        // スクロール時・カーソルがウィンドウ外に出た時にプレビューを隠す
        document.querySelector('.table-wrapper').addEventListener('scroll', hideCursorPreview);
        document.addEventListener('mouseleave', hideCursorPreview);

        // App icon eye-following
        const SVG_SIZE = 281;
        const leftEye  = { cx: 88.394,  cy: 141.174, px: 101.644, py: 165.944 };
        const rightEye = { cx: 193.488, cy: 140.921, px: 221.636, py: 129.69  };
        const maxMove  = 52.57 - 19.25;

        function movePupil(el, eye, svgX, svgY) {
          const dx = svgX - eye.cx;
          const dy = svgY - eye.cy;
          const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const factor = Math.min(maxMove, dist) / dist;
          const tx = (eye.cx + dx * factor) - eye.px;
          const ty = (eye.cy + dy * factor) - eye.py;
          gsap.to(el, { attr: { transform: `translate(${tx}, ${ty})` }, duration: 0.3, ease: 'power2.out' });
        }

        function updateEyes(clientX, clientY, link, pL, pR) {
          if (!link || !pL || !pR) return;
          const rect = link.getBoundingClientRect();
          const svgX = (clientX - rect.left) / rect.width  * SVG_SIZE;
          const svgY = (clientY - rect.top)  / rect.height * SVG_SIZE;
          movePupil(pL, leftEye,  svgX, svgY);
          movePupil(pR, rightEye, svgX, svgY);
        }

        // PC: mousemove → fixed icon
        const pcLink  = document.querySelector('body > .app-icon-link');
        const pcPupilL = document.getElementById('appIconPupilL');
        const pcPupilR = document.getElementById('appIconPupilR');
        document.addEventListener('mousemove', (e) => {
          updateEyes(e.clientX, e.clientY, pcLink, pcPupilL, pcPupilR);
        });

      });
