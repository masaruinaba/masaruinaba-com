<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - v0006 Refined</title>
  
  <!-- GSAP -->
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --bg-color: #1a1a1a;
      --card-border: rgba(255, 255, 255, 0.1);
      --card-radius: 4.89px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    /* 左側のロゴセクション */
    .sidebar {
      position: absolute;
      left: 198px;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      z-index: 100;
      pointer-events: none;
    }

    .logo-maison {
      width: 200px; /* 横200pxに変更 */
      height: auto;
    }

    .logo-maison svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 右側のカルーセルセクション */
    .carousel-container {
      position: absolute;
      left: 50%; /* 画面右半分 */
      top: 0;
      bottom: 0;
      width: 50%; /* 画面右半分 */
      display: flex;
      align-items: center;
      justify-content: center; /* 右半分の中で中央配置 */
      overflow: visible;
      perspective: 2000px;
    }

    .carousel-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px; /* リスト間のマージンを24pxに */
      padding: 0;
      will-change: transform;
      transform-style: preserve-3d;
    }

    .card {
      width: 460px; /* 460pxの正方形 */
      height: 460px; /* 460pxの正方形 */
      border-radius: 0px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background-color: #000;
      border: none;
      box-shadow: none;
      flex-shrink: 0;
    }

    .card img, .thumbnail-wrapper {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* マウスオーバーの拡大はなし */

    /* 数字も無しなので .card-label 関連を削除 */
    .card-label {
      display: none;
    }

    /* サムネイルとしてのiframe */
    .thumbnail-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    .card-thumbnail-iframe {
      width: 200%;
      height: 200%;
      border: none;
      pointer-events: none;
      transform: scale(0.5);
      transform-origin: 0 0;
      opacity: 0.8;
      transition: opacity 0.5s ease;
    }

    .card:hover .card-thumbnail-iframe {
      opacity: 1;
    }

    /* モーダル */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      display: none;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(15px);
    }

    .modal-content {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 2;
      display: flex;
      flex-direction: column;
      /* 初期状態は左上に収束 */
      clip-path: polygon(0 0, 0 0, 0 0, 0 0);
      will-change: clip-path;
    }

    .modal-iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-button {
      position: absolute;
      top: 40px;
      right: 40px;
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: all 0.3s ease;
      opacity: 0; /* 最初は隠す */
    }

    .close-button:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(90deg);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- 左側: Maison Logo (正確な比率を保持) -->
    <div class="sidebar">
      <div class="logo-maison">

          <defs>
            <clipPath id="clip0_1639_9843">
              <rect width="257" height="60" fill="white"/>

        </svg>
      </div>
    </div>

    <!-- 右側: カルーセル -->
    <div class="carousel-container" id="carousel-container">
      <div class="carousel-track" id="carousel-track">
        <!-- JSで生成 -->
      </div>
    </div>
  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content" id="modal-content">
      <button class="close-button" id="close-modal">&times;</button>
      <iframe src="" class="modal-iframe" id="modal-iframe"></iframe>
    </div>
  </div>

  <script>
    const track = document.getElementById('carousel-track');
    const container = document.getElementById('carousel-container');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');
    const modalIframe = document.getElementById('modal-iframe');
    const closeModal = document.getElementById('close-modal');

    // データ定義 (10件リピート)
    const projectData = [
      { url: 'v0001.html', id: 'V0001' },
      { url: 'v0002.html', id: 'V0002' },
      { url: 'v0003.html', id: 'V0003' },
      { url: 'v0004.html', id: 'V0004' },
      { url: 'v0005.html', id: 'V0005' },
    ];
    // 2回繰り返して10件にする
    const fullList = [...projectData, ...projectData];

    // カード生成 (すべてiframeサムネイル)
    fullList.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-url', item.url);
      
      card.innerHTML = `
        <div class="thumbnail-wrapper">
          <iframe src="${item.url}?preview=true" class="card-thumbnail-iframe"></iframe>
        </div>
      `;
      
      card.addEventListener('click', () => openModal(item.url, card));
      track.appendChild(card);
    });

    // --- 無限ドラムロール & スムーズアニメーション ---
    
    // 無限ループのためにクローンを作成 (上と下に十分な数を配置)
    const originalCards = Array.from(track.children);
    // 前後にクローンを追加して3倍の長さに
    originalCards.forEach(card => {
      const clone = card.cloneNode(true);
      clone.addEventListener('click', () => {
        lastClickedCard = clone;
        openModal(card.getAttribute('data-url'), clone);
      });
      track.appendChild(clone);
    });
    originalCards.slice().reverse().forEach(card => {
      const clone = card.cloneNode(true);
      clone.addEventListener('click', () => {
        lastClickedCard = clone;
        openModal(card.getAttribute('data-url'), clone);
      });
      track.prepend(clone);
    });

    let scrollPos = 0;
    let targetPos = 0;
    const friction = 0.08;
    const snapStrength = 0.04; // ピン（スナップ）の強さ
    const cardHeight = 460;
    const gap = 24;
    const cardHeightWithGap = cardHeight + gap;
    const totalOriginalHeight = cardHeightWithGap * fullList.length;

    // 初期位置設定（中央のセットの先頭がコンテナ中央に来るように）
    const containerCenter = container.offsetHeight / 2;
    scrollPos = targetPos = -totalOriginalHeight - (cardHeight / 2) + containerCenter;

    window.addEventListener('wheel', (e) => {
      if (modalOverlay.style.display === 'block') return;
      targetPos -= e.deltaY * 0.8;
    }, { passive: true });

    function update() {
      const diff = targetPos - scrollPos;
      scrollPos += diff * friction;

      // 慣性が弱まったら、最も近いカードに軽くピン（スナップ）する
      if (Math.abs(diff) < 30) {
        const idealPos = containerCenter - cardHeight / 2;
        const closestIndex = Math.round((idealPos - scrollPos) / cardHeightWithGap);
        const snapTarget = idealPos - (closestIndex * cardHeightWithGap);
        targetPos += (snapTarget - targetPos) * snapStrength;
      }

      // 無限ループのジャンプ判定を安定させる
      const minLimit = -totalOriginalHeight * 1.5;
      const maxLimit = -totalOriginalHeight * 0.5;

      if (scrollPos < minLimit) {
        scrollPos += totalOriginalHeight;
        targetPos += totalOriginalHeight;
      } else if (scrollPos > maxLimit) {
        scrollPos -= totalOriginalHeight;
        targetPos -= totalOriginalHeight;
      }

      gsap.set(track, { y: scrollPos });

      // カードごとの3D演出
      const allCards = track.querySelectorAll('.card');
      const centerY = container.offsetHeight / 2;

      allCards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const cardCenterY = rect.top + rect.height / 2;
        const dist = (cardCenterY - centerY) / (container.offsetHeight * 0.8);
        const absDist = Math.abs(dist);

        const scale = 1.0 - absDist * 0.3; 
        const rotateX = dist * -25;
        const opacity = 1.0 - absDist * 0.7;
        const translateZ = (1.0 - absDist) * 150;

        gsap.set(card, {
          scale: Math.max(0.6, scale),
          rotationX: rotateX,
          opacity: Math.max(0.1, opacity),
          z: translateZ,
          transformOrigin: "center center"
        });
      });

      requestAnimationFrame(update);
    }
    update();

    // --- モーダル制御 (カードから四隅へ広がるフラッグ・アニメーション) ---
    function openModal(url, cardElement) {
      if (!url) return;
      
      const rect = cardElement.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // カードの四隅をパーセントに変換
      const initialCorners = {
        tlx: (rect.left / vw) * 100, tly: (rect.top / vh) * 100,
        trx: (rect.right / vw) * 100, try: (rect.top / vh) * 100,
        brx: (rect.right / vw) * 100, bry: (rect.bottom / vh) * 100,
        blx: (rect.left / vw) * 100, bly: (rect.bottom / vh) * 100
      };

      const corners = { ...initialCorners };

      modalIframe.src = url;
      modalOverlay.style.display = 'block';

      const updateClipPath = () => {
        gsap.set(modalContent, {
          clipPath: `polygon(${corners.tlx}% ${corners.tly}%, ${corners.trx}% ${corners.try}%, ${corners.brx}% ${corners.bry}%, ${corners.blx}% ${corners.bly}%)`
        });
      };

      // 初期状態をセット
      updateClipPath();

      const tl = gsap.timeline({
        onUpdate: updateClipPath
      });

      // カードの形から、四隅へ順番に「ビタ付き」していくアニメーション
      tl.to(corners, { 
          tlx: 0, tly: 0, 
          trx: 100, try: 0, 
          duration: 0.5, 
          ease: "expo.inOut" 
        })
        .to(corners, { 
          brx: 100, bry: 100, 
          duration: 0.6, 
          ease: "expo.inOut" 
        }, "-=0.35")
        .to(corners, { 
          blx: 0, bly: 100, 
          duration: 0.5, 
          ease: "expo.inOut" 
        }, "-=0.35")
        .to(closeModal, { opacity: 1, duration: 0.3, ease: "power2.out" });
    }

    function hideModal(targetCardElement) {
      if (!targetCardElement) {
        gsap.to(modalContent, { opacity: 0, duration: 0.3, onComplete: () => {
          modalOverlay.style.display = 'none';
          modalIframe.src = '';
        }});
        return;
      }

      const rect = targetCardElement.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const targetCorners = {
        tlx: (rect.left / vw) * 100, tly: (rect.top / vh) * 100,
        trx: (rect.right / vw) * 100, try: (rect.top / vh) * 100,
        brx: (rect.right / vw) * 100, bry: (rect.bottom / vh) * 100,
        blx: (rect.left / vw) * 100, bly: (rect.bottom / vh) * 100
      };

      const corners = {
        tlx: 0, tly: 0,
        trx: 100, try: 0,
        brx: 100, bry: 100,
        blx: 0, bly: 100
      };

      const updateClipPath = () => {
        gsap.set(modalContent, {
          clipPath: `polygon(${corners.tlx}% ${corners.tly}%, ${corners.trx}% ${corners.try}%, ${corners.brx}% ${corners.bry}%, ${corners.blx}% ${corners.bly}%)`
        });
      };

      const tl = gsap.timeline({
        onUpdate: updateClipPath,
        onComplete: () => {
          modalOverlay.style.display = 'none';
          modalIframe.src = '';
          gsap.set(closeModal, { opacity: 0 });
        }
      });

      tl.to(closeModal, { opacity: 0, duration: 0.2 })
        .to(corners, { 
          tlx: targetCorners.tlx, tly: targetCorners.tly,
          trx: targetCorners.trx, try: targetCorners.try,
          duration: 0.5, ease: "expo.inOut" 
        })
        .to(corners, { 
          brx: targetCorners.brx, bry: targetCorners.bry,
          blx: targetCorners.blx, bly: targetCorners.bly,
          duration: 0.5, ease: "expo.inOut" 
        }, "-=0.35");
    }

    let lastClickedCard = null;

    // カード生成 (すべてiframeサムネイル)
    fullList.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-url', item.url);
      
      card.innerHTML = `
        <div class="thumbnail-wrapper">
          <iframe src="${item.url}?preview=true" class="card-thumbnail-iframe"></iframe>
        </div>
      `;
      
      card.addEventListener('click', () => {
        lastClickedCard = card;
        openModal(item.url, card);
      });
      track.appendChild(card);
    });

    closeModal.addEventListener('click', () => hideModal(lastClickedCard));
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideModal(lastClickedCard);
    });

  </script>
</body>
