<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosaic Reveal Animation</title>

    <!-- GSAP -->
    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        background: #000000;
        cursor: none;
      }

      .mosaic-container {
        position: fixed;
        pointer-events: none;
      }

      .mosaic-card {
        position: absolute;
        width: 200px;
        height: 200px;
        overflow: hidden;
        background: #000000;
        transform: translate(-50%, -50%);
      }

      .mosaic-tile {
        position: absolute;
        will-change: clip-path, opacity, filter;
      }

      .mosaic-blurLayer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        filter: blur(6px);
        opacity: 0.9;
        will-change: filter, opacity;
      }
    </style>
  </head>
  <body>
    <div class="mosaic-container" id="mosaicContainer"></div>

    <script>
      // マウス位置
      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;

      // 複数の画像URL
      const imageUrls = [
        "https://picsum.photos/1200/1200?random=1",
        "https://picsum.photos/1200/1200?random=2",
        "https://picsum.photos/1200/1200?random=3",
        "https://picsum.photos/1200/1200?random=4",
        "https://picsum.photos/1200/1200?random=5",
        "https://picsum.photos/1200/1200?random=6",
      ];

      /**
       * 観音扉式モザイクrevealアニメーション
       */
      function initMosaicReveal(cardElement, options = {}) {
        const config = {
          imageSrc: imageUrls[Math.floor(Math.random() * imageUrls.length)],
          cols: 12,
          rows: 12,
          blurDuration: 0.3,
          revealDuration: 0.8,
          closeDuration: 0.6,
          staggerEach: 0.003,
          ...options,
        };

        const card = cardElement;
        if (!card || !window.gsap) return;

        // 既存のタイルをクリア
        const existingTiles = card.querySelectorAll(".mosaic-tile");
        existingTiles.forEach((tile) => tile.remove());

        const blurLayer = card.querySelector("[data-blur]");
        if (blurLayer) {
          blurLayer.style.backgroundImage = `url("${config.imageSrc}")`;
          blurLayer.style.backgroundSize = "cover";
          blurLayer.style.backgroundPosition = "center";
        }

        const w = card.clientWidth || 200;
        const h = card.clientHeight || 200;
        const tileW = w / config.cols;
        const tileH = h / config.rows;

        const tiles = [];
        const centerX = config.cols / 2;

        // タイル生成
        for (let y = 0; y < config.rows; y++) {
          for (let x = 0; x < config.cols; x++) {
            const tile = document.createElement("div");
            tile.className = "mosaic-tile";

            tile.style.width = tileW + "px";
            tile.style.height = tileH + "px";
            tile.style.left = x * tileW + "px";
            tile.style.top = y * tileH + "px";

            tile.style.backgroundImage = `url("${config.imageSrc}")`;
            tile.style.backgroundSize = `${config.cols * 100}% ${config.rows * 100}%`;
            tile.style.backgroundPosition = `${(x * 100) / (config.cols - 1)}% ${(y * 100) / (config.rows - 1)}%`;

            // 中心からの距離（観音扉の開閉順序用）
            const distanceFromCenter = Math.abs(x - centerX);
            tile.dataset.distance = distanceFromCenter;
            tile.dataset.x = x;

            card.appendChild(tile);
            tiles.push(tile);
          }
        }

        // アニメーション実行関数（開く→閉じる）
        function playAnimation() {
          // タイムラインをクリア
          if (card.timeline) {
            card.timeline.kill();
          }

          // 初期状態：観音扉が閉じた状態（中央から左右に閉じる）
          gsap.set(tiles, {
            clipPath: "inset(0 50% 0 50%)", // 左右から50%ずつ閉じている
            opacity: 1,
          });

          // ぼかしレイヤーの初期状態
          if (blurLayer) {
            gsap.set(blurLayer, {
              filter: "blur(6px)",
              opacity: 0.9,
            });
          }

          const tl = gsap.timeline({ defaults: { ease: "power3.inOut" } });
          card.timeline = tl;

          // ぼかし解除
          if (blurLayer) {
            tl.to(
              blurLayer,
              {
                filter: "blur(0px)",
                opacity: 0,
                duration: config.blurDuration,
              },
              0
            );
          }

          // 観音扉が開く：中央から左右に開く
          // 中心からの距離でソート（中心から外側へ）
          let sortedTiles = [...tiles];
          sortedTiles.sort((a, b) => {
            const distA = parseFloat(a.dataset.distance);
            const distB = parseFloat(b.dataset.distance);
            if (distA !== distB) return distA - distB;
            // 同じ距離ならランダム
            return Math.random() - 0.5;
          });

          const staggerConfig = {
            each: config.staggerEach,
            from: "start",
            ease: "power3.inOut",
          };

          // 開くアニメーション
          tl.to(
            sortedTiles,
            {
              clipPath: "inset(0)",
              duration: config.revealDuration,
              stagger: staggerConfig,
            },
            config.blurDuration * 0.5
          );

          // 閉じるアニメーション（開いた後、少し待ってから閉じる）
          tl.to(
            sortedTiles,
            {
              clipPath: "inset(0 50% 0 50%)",
              duration: config.closeDuration,
              stagger: {
                each: config.staggerEach,
                from: "end", // 外側から内側へ閉じる
                ease: "power3.inOut",
              },
            },
            `+=0.2` // 開いた後0.2秒待つ
          );
        }

        // 初回アニメーション
        playAnimation();

        // アニメーションを繰り返し
        const repeatInterval = setInterval(() => {
          // 新しい画像をランダムに選択
          config.imageSrc = imageUrls[Math.floor(Math.random() * imageUrls.length)];
          if (blurLayer) {
            blurLayer.style.backgroundImage = `url("${config.imageSrc}")`;
          }
          // タイルの背景画像も更新
          tiles.forEach((tile) => {
            tile.style.backgroundImage = `url("${config.imageSrc}")`;
          });
          playAnimation();
        }, (config.revealDuration + config.closeDuration + 0.2) * 1000);

        card.repeatInterval = repeatInterval;

        return {
          play: playAnimation,
          destroy: () => {
            if (card.timeline) card.timeline.kill();
            if (card.repeatInterval) clearInterval(card.repeatInterval);
          },
        };
      }

      // 画像カードの管理
      const container = document.getElementById("mosaicContainer");
      const cardCount = 5;
      const cardInstances = [];
      const cardSpacing = 250; // カード間の距離

      // カードを作成
      for (let i = 0; i < cardCount; i++) {
        const card = document.createElement("div");
        card.className = "mosaic-card";
        card.id = `mosaic-${i}`;

        const blurLayer = document.createElement("div");
        blurLayer.className = "mosaic-blurLayer";
        blurLayer.setAttribute("data-blur", "");

        card.appendChild(blurLayer);
        container.appendChild(card);

        // アニメーション初期化
        const instance = initMosaicReveal(card, {
          cols: 12,
          rows: 12,
          blurDuration: 0.3,
          revealDuration: 0.8,
          closeDuration: 0.6,
          staggerEach: 0.003,
        });

        // 初期位置を設定（マウス位置から一定間隔で配置）
        const angle = (i / cardCount) * Math.PI * 2;
        const initialX = mouseX + Math.cos(angle) * cardSpacing;
        const initialY = mouseY + Math.sin(angle) * cardSpacing;

        gsap.set(card, {
          x: initialX,
          y: initialY,
        });

        cardInstances.push({
          card,
          instance,
          index: i,
        });
      }

      // マウス追従と無限ループシステム
      let rotationOffset = 0; // 全体の回転オフセット

      function updateCards() {
        // マウス移動に応じて回転を更新（ゆっくりと回転）
        rotationOffset += 0.002;

        cardInstances.forEach(({ card, index }) => {
          // 各カードの基本角度（均等に配置）
          const baseAngle = (index / cardCount) * Math.PI * 2;
          // 回転オフセットを加える
          const angle = baseAngle + rotationOffset;

          const targetX = mouseX + Math.cos(angle) * cardSpacing;
          const targetY = mouseY + Math.sin(angle) * cardSpacing;

          // スムーズに追従
          gsap.to(card, {
            x: targetX,
            y: targetY,
            duration: 2,
            ease: "power1.out",
          });
        });
      }

      // マウス位置を追跡
      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      // アニメーションループ（スムーズな追従のため）
      function animate() {
        updateCards();
        requestAnimationFrame(animate);
      }
      animate();

      // ウィンドウリサイズ時の処理
      window.addEventListener("resize", () => {
        mouseX = window.innerWidth / 2;
        mouseY = window.innerHeight / 2;
      });
    </script>
  </body>
</html>
